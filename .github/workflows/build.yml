name: CI/CD
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            
            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: 3.12
            - name: Install deps
              run: |
                pip install -r app/requirements.txt
                pip install pytest
            - name: pytest
              run: pytest 
